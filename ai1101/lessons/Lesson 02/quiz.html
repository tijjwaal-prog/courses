<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to AI Concepts - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #0f172a;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        html.dark body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
        }

        .arabic-text {
            font-family: 'Cairo', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
        }

        html.dark .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        html.dark .option-btn:hover:not(:disabled) {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .option-btn.selected {
            border-color: #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.1) !important;
        }

        html.dark .option-btn.selected {
            background-color: rgba(59, 130, 246, 0.2) !important;
        }

        .feedback-enter {
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        html.dark .custom-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-3xl glass-panel rounded-2xl p-6 md:p-8 relative overflow-hidden">
        
        <!-- Theme Toggle Button -->
        <button id="theme-toggle" class="absolute top-4 right-4 md:top-6 md:right-6 p-2 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-yellow-400 transition-colors duration-300 focus:outline-none hover:bg-slate-300 dark:hover:bg-slate-600">
            <i class="fas fa-moon dark:hidden text-lg"></i>
            <i class="fas fa-sun hidden dark:block text-lg"></i>
        </button>

        <!-- Header -->
        <header class="mb-8 text-center border-b border-black/10 dark:border-white/10 pb-6 mt-4">
            <h1 class="arabic-text text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 mb-2">
                مقدمة في مفاهيم الذكاء الاصطناعي
            </h1>
            <p class="text-slate-600 dark:text-slate-400 text-sm md:text-base">Interactive Quiz on AI Agents & Environments</p>
            
            <!-- Progress Bar -->
            <div class="mt-6 flex items-center justify-between text-sm text-slate-700 dark:text-slate-300 font-medium mb-2">
                <span id="question-counter">Question 1 of 20</span>
                <span id="score-display">Score: 0</span>
            </div>
            <div class="w-full bg-slate-300 dark:bg-slate-700 rounded-full h-2.5">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-purple-500 h-2.5 rounded-full transition-all duration-500" style="width: 5%"></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="quiz-container">
            <!-- Questions injected here by JS -->
        </main>

        <!-- Footer / Controls -->
        <footer class="mt-8 pt-4 border-t border-black/10 dark:border-white/10 flex justify-end">
            <button id="submit-btn" class="hidden bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/30 w-full md:w-auto">
                Submit Answer
            </button>
            <button id="next-btn" class="hidden bg-purple-600 hover:bg-purple-500 text-white font-semibold py-3 px-8 rounded-xl transition-all duration-300 shadow-lg shadow-purple-500/30 w-full md:w-auto">
                Next Question <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </footer>
    </div>

    <script>
        // --- Theme Toggle Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        // Check local storage or system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else if (localStorage.getItem('theme') === 'light') {
            htmlElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        // Quiz Data extracted directly from the PDF Lecture
        const questions = [
            // --- MULTIPLE CHOICE ---
            {
                type: "mcq",
                q: "What are the two foundational building blocks of an AI Agent?",
                options: [
                    "A) Memory and Processing Units",
                    "B) Sensors and Actuators",
                    "C) Keyboards and Displays",
                    "D) Internet and Cloud Servers"
                ],
                ans: 1,
                exp: "According to Slide 3, an intelligent agent perceives its environment through 'Sensors' (like cameras) and acts upon it using 'Actuators' (like robotic arms)."
            },
            {
                type: "mcq",
                q: "Which of the following best describes the 'Stock Market' environment?",
                options: [
                    "A) Static Environment",
                    "B) Fully Observable Environment",
                    "C) Dynamic Environment",
                    "D) Partially Observable Environment"
                ],
                ans: 2,
                exp: "Slide 6 explicitly lists the stock market as a 'Dynamic' environment because prices and trends change constantly and independently of the agent's actions."
            },
            {
                type: "mcq",
                q: "How does a Simple Reflex Agent make its decisions?",
                options: [
                    "A) By analyzing long-term consequences and planning.",
                    "B) By relying strictly on an internal memory of past events.",
                    "C) By evaluating multiple outcomes to maximize a utility function.",
                    "D) By using simple 'if-then' condition-action rules."
                ],
                ans: 3,
                exp: "Slide 8 explains that Simple Reflex Agents act on immediate stimuli using pre-programmed 'if-then' rules, without any memory or future planning."
            },
            {
                type: "mcq",
                q: "Which type of agent evaluates multiple possible outcomes to choose the one that maximizes satisfaction or efficiency?",
                options: [
                    "A) Utility-Based Agent",
                    "B) Goal-Based Agent",
                    "C) Model-Based Reflex Agent",
                    "D) Simple Reflex Agent"
                ],
                ans: 0,
                exp: "As seen in Slide 12, Utility-Based Agents don't just reach a goal; they compare options to find the highest 'utility' (best quality/efficiency), like Amazon's recommendation engine."
            },
            {
                type: "mcq",
                q: "What is a distinguishing characteristic of the 'Agentic AI Era' compared to traditional AI?",
                options: [
                    "A) It is restricted only to basic task automation.",
                    "B) It relies entirely on Simple Reflex rules.",
                    "C) It demonstrates autonomy, understands context, and can adapt its workflow.",
                    "D) It cannot make human-like judgment calls."
                ],
                ans: 2,
                exp: "Slide 18 states Agentic AI acts as a highly intelligent assistant that understands precise instructions, sets goals, takes initiative, and adapts, going far beyond basic automation."
            },

            // --- TRUE / FALSE ---
            {
                type: "tf",
                q: "True or False: A fully observable environment (like a Chess board) means the agent has access to all necessary information at all times.",
                ans: true,
                exp: "Slide 6 defines a fully observable environment as one where nothing is hidden from the agent, using Chess as the primary example."
            },
            {
                type: "tf",
                q: "True or False: Simple Reflex Agents are highly effective in complex, dynamic, and partially observable environments.",
                ans: false,
                exp: "Slide 8 points out that Simple Reflex Agents fail in complex/dynamic environments. They only work efficiently in fully observable, structured, and static environments."
            },
            {
                type: "tf",
                q: "True or False: A robot vacuum cleaner is considered a Goal-Based Agent because it plans its path to achieve a specific outcome (a clean room).",
                ans: true,
                exp: "Slide 11 explicitly uses the robot vacuum cleaner as an example of a Goal-Based Agent that plans a sequence of actions to reach its target."
            },
            {
                type: "tf",
                q: "True or False: Model-Based Reflex Agents keep an internal map or state of the world to help them deal with partially observable environments.",
                ans: true,
                exp: "Slide 14 confirms that Model-Based agents maintain an internal representation of the environment, allowing them to track hidden information (like self-driving cars mapping obstacles)."
            },
            {
                type: "tf",
                q: "True or False: In healthcare, traditional Simple Reflex AI is now widely replacing Agentic AI for personalized medicine.",
                ans: false,
                exp: "Slide 20 highlights that it is 'Agentic AI' (not Simple Reflex AI) that is opening new frontiers in healthcare, specifically for personalized medicine and autonomous virtual health assistants."
            },

            // --- FILL IN THE BLANKS ---
            {
                type: "fitb",
                q: "An environment, such as a crossword puzzle, that remains unchanged while the agent is attempting to solve it is called a [BLANK] environment.",
                options: ["Dynamic", "Static", "Utility-Based", "Sensors", "Actuators"],
                ans: "Static",
                exp: "Slide 6 defines a Static Environment as one where the problem remains exactly the same until the agent solves it, such as a crossword puzzle."
            },
            {
                type: "fitb",
                q: "Cameras, microphones, and other devices that allow the AI agent to gather data and perceive the world are called [BLANK].",
                options: ["Actuators", "Utility-Based", "Sensors", "Dynamic", "Static"],
                ans: "Sensors",
                exp: "Slide 3 lists cameras and microphones as examples of 'Sensors' that gather information from the environment."
            },
            {
                type: "fitb",
                q: "Mechanisms like robotic arms or software outputs that execute actions to alter the environment are known as [BLANK].",
                options: ["Sensors", "Actuators", "Model-Based", "Static", "Dynamic"],
                ans: "Actuators",
                exp: "According to Slide 3, Actuators execute actions based on decisions, effectively changing the system's state."
            },
            {
                type: "fitb",
                q: "An Amazon product recommendation system is an example of a [BLANK] Agent, as it analyzes preferences to maximize customer satisfaction.",
                options: ["Utility-Based", "Static", "Model-Based", "Sensors", "Actuators"],
                ans: "Utility-Based",
                exp: "Slide 13 uses Amazon's recommendation engine as a classic Utility-Based Agent because it seeks to optimize/maximize user satisfaction and sales simultaneously."
            },
            {
                type: "fitb",
                q: "Self-driving cars are prime examples of [BLANK] Reflex Agents because they maintain an internal map of their surroundings to track unseen obstacles.",
                options: ["Sensors", "Actuators", "Static", "Utility-Based", "Model-Based"],
                ans: "Model-Based",
                exp: "Slide 15 identifies self-driving cars as Model-Based Reflex Agents, noting their reliance on an internal state/map to navigate partially observable environments."
            },

            // --- MATCHING (Implemented as Dropdowns) ---
            {
                type: "match",
                q: "Match the concept to its correct description/example: <br><br><strong>Simple Reflex Agent</strong>",
                options: [
                    "A) Understands complex context, plans, and makes autonomous human-like judgment calls.",
                    "B) Acts purely on immediate 'if-then' triggers with no memory (e.g., Weather App).",
                    "C) Compares various paths to maximize efficiency and satisfaction (e.g., FIFA game AI).",
                    "D) Plans a sequence of steps toward a single target state (e.g., Google Maps navigation).",
                    "E) Relies on an internal state to handle hidden information (e.g., Security system tracking intrusions)."
                ],
                ans: 1, // B
                exp: "Simple Reflex Agents operate purely on stimulus-response rules without memory. A weather app fetching current location data is a perfect example (Slide 8 & 9)."
            },
            {
                type: "match",
                q: "Match the concept to its correct description/example: <br><br><strong>Goal-Based Agent</strong>",
                options: [
                    "A) Understands complex context, plans, and makes autonomous human-like judgment calls.",
                    "B) Acts purely on immediate 'if-then' triggers with no memory (e.g., Weather App).",
                    "C) Compares various paths to maximize efficiency and satisfaction (e.g., FIFA game AI).",
                    "D) Plans a sequence of steps toward a single target state (e.g., Google Maps navigation).",
                    "E) Relies on an internal state to handle hidden information (e.g., Security system tracking intrusions)."
                ],
                ans: 3, // D
                exp: "Goal-Based Agents evaluate how to reach a specific outcome, such as Google Maps calculating the route to a specific destination (Slide 10 & 11)."
            },
            {
                type: "match",
                q: "Match the concept to its correct description/example: <br><br><strong>Utility-Based Agent</strong>",
                options: [
                    "A) Understands complex context, plans, and makes autonomous human-like judgment calls.",
                    "B) Acts purely on immediate 'if-then' triggers with no memory (e.g., Weather App).",
                    "C) Compares various paths to maximize efficiency and satisfaction (e.g., FIFA game AI).",
                    "D) Plans a sequence of steps toward a single target state (e.g., Google Maps navigation).",
                    "E) Relies on an internal state to handle hidden information (e.g., Security system tracking intrusions)."
                ],
                ans: 2, // C
                exp: "Utility-Based Agents don't just find any path to a goal; they find the *best* path to maximize utility, like FIFA AI choosing the best move to win (Slide 12 & 13)."
            },
            {
                type: "match",
                q: "Match the concept to its correct description/example: <br><br><strong>Model-Based Reflex Agent</strong>",
                options: [
                    "A) Understands complex context, plans, and makes autonomous human-like judgment calls.",
                    "B) Acts purely on immediate 'if-then' triggers with no memory (e.g., Weather App).",
                    "C) Compares various paths to maximize efficiency and satisfaction (e.g., FIFA game AI).",
                    "D) Plans a sequence of steps toward a single target state (e.g., Google Maps navigation).",
                    "E) Relies on an internal state to handle hidden information (e.g., Security system tracking intrusions)."
                ],
                ans: 4, // E
                exp: "Model-Based Agents maintain internal models of their environment. Smart security systems use this to distinguish normal states from intrusions (Slide 14 & 15)."
            },
            {
                type: "match",
                q: "Match the concept to its correct description/example: <br><br><strong>Agentic AI</strong>",
                options: [
                    "A) Understands complex context, plans, and makes autonomous human-like judgment calls.",
                    "B) Acts purely on immediate 'if-then' triggers with no memory (e.g., Weather App).",
                    "C) Compares various paths to maximize efficiency and satisfaction (e.g., FIFA game AI).",
                    "D) Plans a sequence of steps toward a single target state (e.g., Google Maps navigation).",
                    "E) Relies on an internal state to handle hidden information (e.g., Security system tracking intrusions)."
                ],
                ans: 0, // A
                exp: "The Agentic AI Era represents systems that take initiative, reason contextually, and adapt workflows autonomously, unlike traditional task-specific AI (Slide 18 & 19)."
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let selectedAnswer = null;

        const container = document.getElementById('quiz-container');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const progress = document.getElementById('progress-bar');
        const counter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');

        function initQuiz() {
            loadQuestion();
            submitBtn.addEventListener('click', checkAnswer);
            nextBtn.addEventListener('click', nextQuestion);
        }

        function loadQuestion() {
            const q = questions[currentIndex];
            selectedAnswer = null;
            submitBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';

            progress.style.width = `${((currentIndex) / questions.length) * 100}%`;
            counter.innerText = `Question ${currentIndex + 1} of ${questions.length}`;

            let html = `<div class="mb-6 fade-in"><h2 class="text-xl md:text-2xl font-semibold leading-relaxed text-slate-800 dark:text-white">${q.q}</h2>`;

            if (q.type === 'mcq' || q.type === 'match') {
                html += `<div class="mt-6 space-y-3">`;
                q.options.forEach((opt, idx) => {
                    html += `
                        <button onclick="selectOption(${idx})" id="opt-${idx}" class="option-btn w-full text-left p-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none text-slate-800 dark:text-white">
                            ${opt}
                        </button>
                    `;
                });
                html += `</div>`;
            } 
            else if (q.type === 'tf') {
                html += `<div class="mt-8 grid grid-cols-2 gap-4">
                    <button onclick="selectOption(true)" id="opt-true" class="option-btn py-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-700 text-lg font-bold text-green-600 dark:text-green-400">TRUE</button>
                    <button onclick="selectOption(false)" id="opt-false" class="option-btn py-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-700 text-lg font-bold text-red-600 dark:text-red-400">FALSE</button>
                </div>`;
            }
            else if (q.type === 'fitb') {
                html += `
                <div class="mt-6 p-4 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600">
                    <p class="text-sm text-slate-600 dark:text-slate-400 mb-2 font-semibold tracking-wide uppercase"><i class="fas fa-layer-group mr-2"></i>Word Bank:</p>
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${q.options.map(o => `<span class="px-3 py-1 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded-md text-sm border border-blue-300 dark:border-blue-700/50">${o}</span>`).join('')}
                    </div>
                    <label class="block text-sm font-medium mb-2 text-slate-800 dark:text-white">Select the missing word:</label>
                    <select id="fitb-select" onchange="selectOption(this.value)" class="custom-select w-full p-4 rounded-xl bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-500 text-slate-900 dark:text-white focus:outline-none focus:border-blue-500 text-lg">
                        <option value="" disabled selected>Choose the correct term...</option>
                        ${q.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                    </select>
                </div>`;
            }

            html += `<div id="feedback-area" class="mt-6 hidden rounded-xl p-5"></div></div>`;
            container.innerHTML = html;
        }

        window.selectOption = function(value) {
            const q = questions[currentIndex];
            selectedAnswer = value;

            // Reset UI styles
            if(q.type === 'mcq' || q.type === 'match') {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.classList.remove('selected', 'border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/30');
                });
                const selectedBtn = document.getElementById(`opt-${value}`);
                selectedBtn.classList.add('selected', 'border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/30');
            } else if (q.type === 'tf') {
                document.getElementById('opt-true').classList.remove('selected', 'border-blue-500');
                document.getElementById('opt-false').classList.remove('selected', 'border-blue-500');
                document.getElementById(`opt-${value}`).classList.add('selected', 'border-blue-500');
            }

            // Enable submit
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
        }

        function checkAnswer() {
            const q = questions[currentIndex];
            let isCorrect = false;

            if (q.type === 'mcq' || q.type === 'match') {
                isCorrect = (selectedAnswer === q.ans);
            } else if (q.type === 'tf') {
                isCorrect = (selectedAnswer === q.ans);
            } else if (q.type === 'fitb') {
                isCorrect = (selectedAnswer === q.ans);
            }

            // Disable inputs
            if(q.type === 'mcq' || q.type === 'match' || q.type === 'tf') {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('cursor-not-allowed', 'opacity-50');
                });
            } else if (q.type === 'fitb') {
                document.getElementById('fitb-select').disabled = true;
            }

            const feedbackEl = document.getElementById('feedback-area');
            feedbackEl.classList.remove('hidden');
            feedbackEl.classList.add('feedback-enter');

            if (isCorrect) {
                score++;
                scoreDisplay.innerText = `Score: ${score}`;
                feedbackEl.classList.add('bg-green-100', 'dark:bg-green-900/30', 'border', 'border-green-300', 'dark:border-green-500/50');
                feedbackEl.innerHTML = `
                    <div class="flex items-start">
                        <div class="flex-shrink-0 text-green-600 dark:text-green-400 text-2xl mt-1"><i class="fas fa-check-circle"></i></div>
                        <div class="ml-4">
                            <h3 class="text-green-700 dark:text-green-400 font-bold text-lg arabic-text">✔️ إجابة صحيحة! (Correct)</h3>
                            <p class="text-slate-700 dark:text-slate-200 mt-2 text-sm leading-relaxed">${q.exp}</p>
                        </div>
                    </div>
                `;
            } else {
                feedbackEl.classList.add('bg-red-100', 'dark:bg-red-900/30', 'border', 'border-red-300', 'dark:border-red-500/50');
                
                // Formulate correction text
                let correctAnswerText = "";
                if(q.type === 'mcq' || q.type === 'match') correctAnswerText = q.options[q.ans];
                else if(q.type === 'tf') correctAnswerText = q.ans ? "TRUE" : "FALSE";
                else if(q.type === 'fitb') correctAnswerText = q.ans;

                feedbackEl.innerHTML = `
                    <div class="flex items-start">
                        <div class="flex-shrink-0 text-red-600 dark:text-red-400 text-2xl mt-1"><i class="fas fa-times-circle"></i></div>
                        <div class="ml-4">
                            <h3 class="text-red-700 dark:text-red-400 font-bold text-lg arabic-text">❌ إجابة خاطئة! (Incorrect)</h3>
                            <p class="text-slate-900 dark:text-white font-medium mt-2 bg-red-200 dark:bg-red-950/50 inline-block px-3 py-1 rounded-lg border border-red-300 dark:border-red-800/50">
                                <span class="arabic-text">الخيار الصحيح هو:</span> <br>${correctAnswerText}
                            </p>
                            <p class="text-slate-700 dark:text-slate-200 mt-3 text-sm leading-relaxed bg-white/60 dark:bg-black/20 p-3 rounded-lg arabic-text border border-slate-300 dark:border-white/5">
                                <strong class="text-blue-700 dark:text-blue-300">لماذا هذا الخيار هو الأفضل؟</strong><br>
                                <span class="font-sans">${q.exp}</span>
                            </p>
                        </div>
                    </div>
                `;
            }

            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            progress.style.width = '100%';
            counter.innerText = 'Quiz Completed!';
            
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let color = "";
            
            if(percentage >= 85) { message = "ممتاز! فهم عميق للمفاهيم."; color = "text-green-600 dark:text-green-400"; }
            else if(percentage >= 60) { message = "جيد جداً، لقد استوعبت الأساسيات."; color = "text-blue-600 dark:text-blue-400"; }
            else { message = "تحتاج إلى مراجعة المحاضرة مرة أخرى."; color = "text-yellow-600 dark:text-yellow-400"; }

            container.innerHTML = `
                <div class="text-center py-10 fade-in">
                    <i class="fas fa-trophy text-6xl text-yellow-500 mb-6 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]"></i>
                    <h2 class="text-3xl font-bold mb-4 text-slate-800 dark:text-white">Quiz Results</h2>
                    <div class="text-5xl font-black mb-4 ${color}">${score} <span class="text-2xl text-slate-500 dark:text-slate-400">/ ${questions.length}</span></div>
                    <p class="text-xl mb-8 arabic-text font-semibold text-slate-700 dark:text-slate-300">${message}</p>
                    
                    <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition duration-300 shadow-lg shadow-blue-500/30">
                        <i class="fas fa-redo mr-2"></i> إعادة الاختبار (Retake Quiz)
                    </button>
                </div>
            `;
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        }

        // Start
        initQuiz();
    </script>
</body>
</html>
