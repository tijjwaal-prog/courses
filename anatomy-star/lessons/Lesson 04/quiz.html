<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeletal Architecture - Interactive Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
        }
        .en-text {
            font-family: 'Inter', sans-serif;
            direction: ltr;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-card {
            transition: all 0.2s ease;
        }
        .option-card:hover {
            transform: translateY(-2px);
        }
        .fib-blank {
            display: inline-block;
            min-width: 120px;
            height: 32px;
            border-bottom: 2px solid #3b82f6;
            margin: 0 8px;
            text-align: center;
            color: #2563eb;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .fib-blank:empty::before {
            content: "Select a word";
            color: #9ca3af;
            font-weight: normal;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-700 text-white shadow-md py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold en-text">Skeletal Architecture Quiz</h1>
            <div class="text-sm bg-indigo-800 px-3 py-1 rounded-full">
                السؤال: <span id="q-counter">1</span> / 20
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-grow flex justify-center items-start">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden fade-in" id="quiz-container">
            
            <!-- Progress Bar -->
            <div class="h-2 bg-gray-200 w-full">
                <div id="progress-bar" class="h-2 bg-indigo-500 transition-all duration-300" style="width: 5%;"></div>
            </div>

            <div class="p-6 md:p-8">
                <!-- Question Header -->
                <div class="mb-6 flex justify-between items-center border-b pb-4">
                    <span id="question-type" class="text-sm font-semibold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-full en-text">Multiple Choice</span>
                    <span class="text-gray-500 font-bold">Points: <span id="score">0</span></span>
                </div>

                <!-- Question Text -->
                <h2 id="question-text" class="text-xl md:text-2xl font-semibold mb-6 en-text text-gray-800"></h2>

                <!-- Options Container -->
                <div id="options-container" class="space-y-3 en-text">
                    <!-- Options injected here via JS -->
                </div>

                <!-- Fill in the Blanks Word Bank (Hidden by default) -->
                <div id="word-bank-container" class="hidden mt-6 en-text border border-dashed border-gray-300 p-4 rounded-lg bg-gray-50">
                    <p class="text-sm text-gray-500 mb-2 font-semibold">Word Bank (Click to fill the blank):</p>
                    <div id="word-bank" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Feedback Section -->
                <div id="feedback-section" class="hidden mt-6 p-4 rounded-lg en-text fade-in">
                    <div class="flex items-start gap-3">
                        <div id="feedback-icon" class="mt-1 flex-shrink-0"></div>
                        <div>
                            <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                            <p id="feedback-desc" class="text-gray-700 text-sm md:text-base"></p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mt-8 flex justify-end gap-3 border-t pt-4">
                    <button id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        إرسال الإجابة (Submit)
                    </button>
                    <button id="next-btn" class="hidden bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                        السؤال التالي (Next)
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Container -->
        <div id="results-container" class="hidden bg-white rounded-2xl shadow-xl w-full max-w-2xl p-8 text-center fade-in">
            <svg class="w-20 h-20 text-indigo-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
            <h2 class="text-3xl font-bold mb-2">اكتمل الاختبار!</h2>
            <p class="text-gray-600 mb-6">لقد أتممت اختبار Skeletal Architecture بنجاح.</p>
            <div class="bg-indigo-50 rounded-lg p-6 mb-6">
                <span class="block text-sm text-indigo-600 font-bold mb-1">النتيجة النهائية</span>
                <span class="text-4xl font-black text-indigo-800" id="final-score">0 / 20</span>
            </div>
            <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg w-full transition-colors">
                إعادة الاختبار (Retake Quiz)
            </button>
        </div>
    </main>

    <script>
        // Quiz Data generated strictly from the "1.1-Skeletal_Architecture.pptx" slides
        const quizData = [
            // --- Multiple Choice (1-5) ---
            {
                type: 'mcq', typeLabel: 'Multiple Choice',
                q: "What is the biological process of converting embryonic tissues to solid bone called?",
                options: ["Hematopoiesis", "Ossification", "Trabeculation", "Articulation"],
                answer: 1,
                explanation: "Ossification is the biological process of converting other embryonic tissues (like membrane or cartilage) into solid bone. It typically begins around week 6 to 8 of embryological development."
            },
            {
                type: 'mcq', typeLabel: 'Multiple Choice',
                q: "Which component of the skeletal system primarily acts as an energy reserve?",
                options: ["Red marrow", "Compact bone", "Yellow marrow", "Spongy bone"],
                answer: 2,
                explanation: "Yellow marrow, housed within the long bones, acts as an energy reserve because it consists primarily of adipose (fat) tissue, whereas red marrow produces blood cells."
            },
            {
                type: 'mcq', typeLabel: 'Multiple Choice',
                q: "According to morphological shapes, how is the patella (kneecap) classified?",
                options: ["Flat bone", "Short bone", "Sesamoid bone", "Irregular bone"],
                answer: 2,
                explanation: "The patella is classified as a Sesamoid bone. These are small bones typically embedded within tendons to protect them and improve joint mechanics."
            },
            {
                type: 'mcq', typeLabel: 'Multiple Choice',
                q: "How many vertebrae make up the Thoracic region, and what is its primary characteristic?",
                options: ["7 (highly movable)", "12 (rib cage attachment, limited movement)", "5 (movable, load-bearing)", "4 (terminal end)"],
                answer: 1,
                explanation: "The Thoracic spine consists of 12 vertebrae (T1-T12). It serves as the attachment point for the rib cage and offers limited movement to protect internal organs."
            },
            {
                type: 'mcq', typeLabel: 'Multiple Choice',
                q: "Which layer forms the dense, solid outer shell of bones to provide primary load-bearing strength?",
                options: ["Spongy Bone", "Periosteum", "Compact Bone", "Endosteum"],
                answer: 2,
                explanation: "Compact Bone forms the rigid, dense outer layer of bones, providing the primary structural support and load-bearing strength, while spongy bone reduces weight."
            },

            // --- True / False (6-10) ---
            {
                type: 'tf', typeLabel: 'True / False',
                q: "The adult human skeleton consists of exactly 206 bones divided into the Axial and Appendicular skeletons.",
                options: ["True", "False"],
                answer: 0, // True
                explanation: "True. The adult skeleton contains 206 bones, which are separated into the Axial skeleton (central axis) and the Appendicular skeleton (extremities and girdles)."
            },
            {
                type: 'tf', typeLabel: 'True / False',
                q: "Intramembranous ossification is derived from cartilage tissue.",
                options: ["True", "False"],
                answer: 1, // False
                explanation: "False. Intramembranous ossification is derived from membrane tissue, whereas Endochondral ossification is derived from cartilage tissue."
            },
            {
                type: 'tf', typeLabel: 'True / False',
                q: "Spongy (Cancellous) bone significantly increases the overall weight of the human skeleton.",
                options: ["True", "False"],
                answer: 1, // False
                explanation: "False. Spongy bone has a porous, honeycomb-like internal architecture that significantly *reduces* the overall weight of the skeleton while housing blood-producing red marrow."
            },
            {
                type: 'tf', typeLabel: 'True / False',
                q: "The vertebral column protects the spinal cord, while the thoracic cage protects the heart and lungs.",
                options: ["True", "False"],
                answer: 0, // True
                explanation: "True. Both structures are vital parts of the axial skeleton's protective central core, shielding the spinal cord and thoracic organs respectively."
            },
            {
                type: 'tf', typeLabel: 'True / False',
                q: "Osteons and Lamellae are part of the macroscopic (visible to naked eye) divisions of the Appendicular skeleton.",
                options: ["True", "False"],
                answer: 1, // False
                explanation: "False. Osteons and Lamellae are microscopic structural units found within the internal complex network of bones, not macroscopic divisions."
            },

            // --- Fill in the Blanks (11-15) ---
            {
                type: 'fib', typeLabel: 'Fill in the Blank',
                q: "The [BLANK] girdle connects the bones of the upper limbs to the axial skeleton, facilitating locomotion and interaction.",
                options: ["Pectoral", "Pelvic", "Cranial", "Costal", "Vertebral"],
                answer: "Pectoral",
                explanation: "The Pectoral (shoulder) girdle is part of the appendicular skeleton and connects the upper limbs to the body's central axis."
            },
            {
                type: 'fib', typeLabel: 'Fill in the Blank',
                q: "Blood cell production occurs in the [BLANK], which is housed within the porous spongy bone tissue.",
                options: ["Red marrow", "Yellow marrow", "Endosteum", "Periosteum", "Osteons"],
                answer: "Red marrow",
                explanation: "Red marrow manufactures circulating blood cells. It is located inside the honeycomb-like architecture of spongy (cancellous) bone."
            },
            {
                type: 'fib', typeLabel: 'Fill in the Blank',
                q: "The protective central core of the body is called the [BLANK] Skeleton, which includes the skull, thoracic cage, and spine.",
                options: ["Axial", "Appendicular", "Sesamoid", "Sutural", "Costal"],
                answer: "Axial",
                explanation: "The Axial skeleton forms the central axis of the body, providing a protective core for the brain, spinal cord, and vital thoracic organs."
            },
            {
                type: 'fib', typeLabel: 'Fill in the Blank',
                q: "In the microscopic landscape of bone, the [BLANK] canal houses the complex network of blood vessels (arteries and veins).",
                options: ["Central", "Perforating", "Endosteal", "Cancellous", "Synovial"],
                answer: "Central",
                explanation: "The Central canal (along with perforating canals) forms the internal network that houses arteries, veins, and capillaries for bone circulation."
            },
            {
                type: 'fib', typeLabel: 'Fill in the Blank',
                q: "The bone matrix acts as a storage facility for essential minerals, primarily storing calcium and [BLANK].",
                options: ["Phosphorous", "Iron", "Potassium", "Sodium", "Magnesium"],
                answer: "Phosphorous",
                explanation: "One of the 5 critical biological functions of the skeleton is Storage. The bone matrix stores essential minerals like calcium and phosphorous."
            },

            // --- Matching Concepts to Definitions (16-20) ---
            {
                type: 'match', typeLabel: 'Matching (List A → List B)',
                q: "Match the Concept from List A: <strong>Cervical Vertebrae</strong> <br> <span class='text-sm font-normal text-gray-500'>Select its correct description from List B below:</span>",
                options: [
                    "Highly movable neck region (C1-C7).",
                    "Movable, load-bearing lower back region (L1-L5).",
                    "5 fused vertebrae joining the spine to the pelvis.",
                    "Flat bones protecting the brain (e.g., Parietal bone).",
                    "Small bones found within the sutures of the skull."
                ],
                answer: 0,
                explanation: "The cervical spine (C1-C7) forms the neck region and is highly movable compared to the thoracic or sacral regions."
            },
            {
                type: 'match', typeLabel: 'Matching (List A → List B)',
                q: "Match the Concept from List A: <strong>Lumbar Vertebrae</strong> <br> <span class='text-sm font-normal text-gray-500'>Select its correct description from List B below:</span>",
                options: [
                    "Highly movable neck region (C1-C7).",
                    "Movable, load-bearing lower back region (L1-L5).",
                    "5 fused vertebrae joining the spine to the pelvis.",
                    "Flat bones protecting the brain (e.g., Parietal bone).",
                    "Small bones found within the sutures of the skull."
                ],
                answer: 1,
                explanation: "The lumbar spine consists of 5 large vertebrae (L1-L5) that are movable and provide major load-bearing support for the lower back."
            },
            {
                type: 'match', typeLabel: 'Matching (List A → List B)',
                q: "Match the Concept from List A: <strong>Sacral Region</strong> <br> <span class='text-sm font-normal text-gray-500'>Select its correct description from List B below:</span>",
                options: [
                    "Highly movable neck region (C1-C7).",
                    "Movable, load-bearing lower back region (L1-L5).",
                    "5 fused vertebrae joining the spine to the pelvis.",
                    "Flat bones protecting the brain (e.g., Parietal bone).",
                    "Small bones found within the sutures of the skull."
                ],
                answer: 2,
                explanation: "The sacrum is made of 5 fused vertebrae that firmly join the flexible spine to the rigid pelvic girdle."
            },
            {
                type: 'match', typeLabel: 'Matching (List A → List B)',
                q: "Match the Concept from List A: <strong>Flat bones</strong> <br> <span class='text-sm font-normal text-gray-500'>Select its correct description from List B below:</span>",
                options: [
                    "Highly movable neck region (C1-C7).",
                    "Movable, load-bearing lower back region (L1-L5).",
                    "5 fused vertebrae joining the spine to the pelvis.",
                    "Flat bones protecting the brain (e.g., Parietal bone).",
                    "Small bones found within the sutures of the skull."
                ],
                answer: 3,
                explanation: "Flat bones, like the Parietal bone of the cranial vault, primarily provide broad surfaces for muscle attachment and structural protection for internal organs like the brain."
            },
            {
                type: 'match', typeLabel: 'Matching (List A → List B)',
                q: "Match the Concept from List A: <strong>Sutural bones</strong> <br> <span class='text-sm font-normal text-gray-500'>Select its correct description from List B below:</span>",
                options: [
                    "Highly movable neck region (C1-C7).",
                    "Movable, load-bearing lower back region (L1-L5).",
                    "5 fused vertebrae joining the spine to the pelvis.",
                    "Flat bones protecting the brain (e.g., Parietal bone).",
                    "Small bones found within the sutures of the skull."
                ],
                answer: 4,
                explanation: "Sutural bones (also known as Wormian bones) are small, extra bone pieces that occur within the suture joints of the skull."
            }
        ];

        // App State
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null; // Can be index (MCQ/TF/Match) or string (FIB)
        let isAnswerSubmitted = false;

        // DOM Elements
        const qCounter = document.getElementById('q-counter');
        const progressBar = document.getElementById('progress-bar');
        const scoreDisplay = document.getElementById('score');
        const questionType = document.getElementById('question-type');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const wordBankContainer = document.getElementById('word-bank-container');
        const wordBank = document.getElementById('word-bank');
        const feedbackSection = document.getElementById('feedback-section');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackDesc = document.getElementById('feedback-desc');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');

        const icons = {
            success: `<svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
            error: `<svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
        };

        function initQuiz() {
            loadQuestion();
            submitBtn.addEventListener('click', checkAnswer);
            nextBtn.addEventListener('click', nextQuestion);
        }

        function loadQuestion() {
            const qData = quizData[currentQuestion];
            isAnswerSubmitted = false;
            selectedAnswer = null;

            // Reset UI
            feedbackSection.classList.add('hidden');
            feedbackSection.className = 'hidden mt-6 p-4 rounded-lg en-text fade-in'; // Reset classes
            nextBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            submitBtn.disabled = true;
            optionsContainer.innerHTML = '';
            wordBank.innerHTML = '';
            wordBankContainer.classList.add('hidden');

            // Update Header info
            qCounter.innerText = currentQuestion + 1;
            progressBar.style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;
            questionType.innerText = qData.typeLabel;

            // Render based on type
            if (qData.type === 'fib') {
                // Render Fill in the blank
                const parts = qData.q.split('[BLANK]');
                questionText.innerHTML = `${parts[0]}<span id="fib-spot" class="fib-blank" onclick="clearFib()"></span>${parts[1]}`;
                
                // Render Word Bank
                wordBankContainer.classList.remove('hidden');
                qData.options.forEach(word => {
                    const btn = document.createElement('button');
                    btn.className = 'bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-full hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-600 font-medium transition-colors shadow-sm';
                    btn.innerText = word;
                    btn.onclick = () => selectFibWord(word);
                    wordBank.appendChild(btn);
                });
            } else {
                // Render MCQ, TF, Match
                questionText.innerHTML = qData.q;
                qData.options.forEach((opt, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option-card border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-indigo-400 bg-white flex items-center gap-3';
                    optionDiv.onclick = () => selectOption(index, optionDiv);
                    
                    const radioCircle = document.createElement('div');
                    radioCircle.className = 'w-5 h-5 rounded-full border-2 border-gray-300 flex-shrink-0 flex items-center justify-center';
                    
                    const innerDot = document.createElement('div');
                    innerDot.className = 'w-2.5 h-2.5 rounded-full bg-indigo-600 hidden';
                    radioCircle.appendChild(innerDot);

                    const optText = document.createElement('span');
                    optText.className = 'text-gray-700 font-medium';
                    optText.innerText = opt;

                    optionDiv.appendChild(radioCircle);
                    optionDiv.appendChild(optText);
                    optionsContainer.appendChild(optionDiv);
                });
            }
        }

        function selectOption(index, element) {
            if (isAnswerSubmitted) return;
            selectedAnswer = index;
            submitBtn.disabled = false;

            // Visual update
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('border-indigo-500', 'bg-indigo-50');
                card.classList.add('border-gray-200');
                card.querySelector('.w-2\\.5').classList.add('hidden');
                card.querySelector('.w-5').classList.remove('border-indigo-500');
            });

            element.classList.remove('border-gray-200');
            element.classList.add('border-indigo-500', 'bg-indigo-50');
            element.querySelector('.w-5').classList.add('border-indigo-500');
            element.querySelector('.w-2\\.5').classList.remove('hidden');
        }

        function selectFibWord(word) {
            if (isAnswerSubmitted) return;
            selectedAnswer = word;
            const spot = document.getElementById('fib-spot');
            spot.innerText = word;
            submitBtn.disabled = false;
        }

        function clearFib() {
            if (isAnswerSubmitted) return;
            selectedAnswer = null;
            document.getElementById('fib-spot').innerText = "";
            submitBtn.disabled = true;
        }

        function checkAnswer() {
            isAnswerSubmitted = true;
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            
            const qData = quizData[currentQuestion];
            let isCorrect = false;

            if (qData.type === 'fib') {
                // Disable word bank
                Array.from(wordBank.children).forEach(btn => btn.disabled = true);
                const spot = document.getElementById('fib-spot');
                
                if (selectedAnswer === qData.answer) {
                    isCorrect = true;
                    spot.classList.add('text-green-600', 'border-green-600');
                } else {
                    spot.classList.add('text-red-600', 'border-red-600', 'line-through');
                    // Show correct answer inline
                    const correctSpan = document.createElement('span');
                    correctSpan.className = "text-green-600 font-bold ml-2";
                    correctSpan.innerText = `(${qData.answer})`;
                    spot.parentNode.insertBefore(correctSpan, spot.nextSibling);
                }
            } else {
                const options = document.querySelectorAll('.option-card');
                // Disable options
                options.forEach(opt => opt.style.pointerEvents = 'none');

                if (selectedAnswer === qData.answer) {
                    isCorrect = true;
                    options[selectedAnswer].classList.add('bg-green-100', 'border-green-500');
                } else {
                    options[selectedAnswer].classList.add('bg-red-100', 'border-red-500');
                    options[qData.answer].classList.add('bg-green-100', 'border-green-500');
                }
            }

            if (isCorrect) {
                score++;
                scoreDisplay.innerText = score;
                showFeedback(true, "Correct Answer!", qData.explanation);
            } else {
                showFeedback(false, "Incorrect", qData.explanation);
            }
        }

        function showFeedback(isCorrect, title, explanation) {
            feedbackSection.classList.remove('hidden');
            if (isCorrect) {
                feedbackSection.classList.add('bg-green-50', 'border', 'border-green-200');
                feedbackIcon.innerHTML = icons.success;
                feedbackTitle.className = 'font-bold text-lg mb-1 text-green-800';
            } else {
                feedbackSection.classList.add('bg-red-50', 'border', 'border-red-200');
                feedbackIcon.innerHTML = icons.error;
                feedbackTitle.className = 'font-bold text-lg mb-1 text-red-800';
            }
            feedbackTitle.innerText = title;
            feedbackDesc.innerHTML = `<strong>Explanation:</strong> ${explanation}`;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            const results = document.getElementById('results-container');
            results.classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
            document.getElementById('q-counter').innerText = 20; // Max out
        }

        // Start Quiz
        window.onload = initQuiz;
    </script>
</body>
</html>
