<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Quiz: Sound Waves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f0f9ff; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .disabled-card { pointer-events: none; opacity: 0.9; }
        
        /* Custom styling for physics equations */
        .eq { font-family: 'Times New Roman', serif; font-style: italic; font-size: 1.15em; font-weight: 600; color: #0369a1; }
        .math-symbol { font-family: 'Times New Roman', serif; font-style: italic; font-weight: bold; }
        .physics-block { background-color: #e0f2fe; padding: 2px 6px; border-radius: 4px; border: 1px solid #bae6fd; font-weight: bold; color: #0c4a6e; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="bg-gradient-to-br from-cyan-600 to-blue-800 text-white rounded-3xl p-8 mb-10 shadow-2xl text-center fade-in border-b-8 border-cyan-400 relative overflow-hidden">
            <!-- Decorative wave element -->
            <div class="absolute inset-0 opacity-10">
                <svg viewBox="0 0 1440 320" class="absolute bottom-0 w-full"><path fill="#ffffff" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,202.7C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,192C1248,181,1344,139,1392,117.3L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
            </div>
            
            <h1 class="relative z-10 text-3xl md:text-5xl font-black mb-4 tracking-tight drop-shadow-lg">Sound Waves</h1>
            <p class="relative z-10 text-cyan-100 text-lg md:text-xl font-medium">General Physics (1) - Interactive Quiz</p>
            <div class="relative z-10 mt-6 flex flex-wrap justify-center gap-3 text-sm font-semibold">
                <span class="bg-white/20 px-4 py-1.5 rounded-full border border-white/30 backdrop-blur-sm shadow-sm">20 Questions</span>
                <span class="bg-white/20 px-4 py-1.5 rounded-full border border-white/30 backdrop-blur-sm shadow-sm">Instant Feedback</span>
                <span class="bg-white/20 px-4 py-1.5 rounded-full border border-white/30 backdrop-blur-sm shadow-sm">Detailed Explanations</span>
            </div>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-container" class="space-y-12"></div>
        
        <!-- Completion Section -->
        <div id="completion-message" class="hidden text-center mt-12 mb-12 fade-in">
            <div class="bg-white p-10 rounded-3xl shadow-xl border-2 border-cyan-100">
                <h2 class="text-3xl font-black text-slate-800 mb-3">Quiz Completed! 🔊</h2>
                <p class="text-lg text-slate-600">You have completed the Sound Waves assessment. Review your detailed feedback below.</p>
                <div class="mt-6 text-6xl font-black text-cyan-600 drop-shadow-sm mb-2" id="final-score"></div>
                <button onclick="location.reload()" class="mt-8 bg-cyan-600 text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-cyan-700 hover:shadow-lg transition-all transform hover:-translate-y-1">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script>
        // Quiz Data Model based on General Physics (1) - Sound Waves (Pages 121-135)
        const quizData = [
            // --- MULTIPLE CHOICE ---
            {
                id: 1, section: "Multiple Choice", type: "mcq",
                question: "Which of the following best describes the physical nature of a sound wave traveling through air?",
                options: [
                    "It is a transverse electromagnetic wave.",
                    "It is a longitudinal mechanical wave.",
                    "It is a transverse mechanical wave.",
                    "It is a standing matter wave."
                ],
                correct: 1,
                explanation: "Sound waves in fluids (like air and water) are <strong>longitudinal mechanical waves</strong>. This means they require a physical medium to travel through, and the particles of the medium oscillate parallel to the direction of wave propagation, creating compressions and rarefactions."
            },
            {
                id: 2, section: "Multiple Choice", type: "mcq",
                question: "<strong>Problem:</strong> The intensity of a sound is <span class='physics-block'>10<sup>-8</sup> W/m<sup>2</sup></span>. What is the sound intensity level in decibels (dB)?<br><span class='text-sm text-slate-500'>(Given threshold of hearing: I<sub>0</sub> = 10<sup>-12</sup> W/m<sup>2</sup>)</span>",
                options: ["20 dB", "40 dB", "60 dB", "80 dB"],
                correct: 1,
                explanation: "Using the decibel formula <span class='eq'>&beta; = 10 &times; log<sub>10</sub>(I / I<sub>0</sub>)</span>: <br>&beta; = 10 &times; log<sub>10</sub>(10<sup>-8</sup> / 10<sup>-12</sup>) <br>&beta; = 10 &times; log<sub>10</sub>(10<sup>4</sup>) <br>&beta; = 10 &times; 4 = <strong>40 dB</strong>."
            },
            {
                id: 3, section: "Multiple Choice", type: "mcq",
                question: "If an ambulance is moving <strong>towards</strong> a stationary observer with its siren blaring, how does the frequency heard by the observer compare to the actual frequency emitted by the siren? (Doppler Effect)",
                options: [
                    "The observed frequency is lower.",
                    "The observed frequency is the same.",
                    "The observed frequency is higher.",
                    "The observed frequency fluctuates randomly."
                ],
                correct: 2,
                explanation: "According to the Doppler Effect, when a source moves <i>towards</i> an observer, the sound wave fronts are compressed. This decreases the wavelength and causes the observer to hear a <strong>higher frequency</strong> (a higher pitch)."
            },
            {
                id: 4, section: "Multiple Choice", type: "mcq",
                question: "<strong>Problem:</strong> Two tuning forks are struck simultaneously. One vibrates at <span class='physics-block'>256 Hz</span> and the other at <span class='physics-block'>260 Hz</span>. What is the resulting beat frequency?",
                options: ["516 Hz", "258 Hz", "4 Hz", "0 Hz"],
                correct: 2,
                explanation: "The beat frequency is simply the absolute difference between the two interfering frequencies: <span class='eq'>f<sub>beat</sub> = |f<sub>1</sub> - f<sub>2</sub>|</span>. <br>f<sub>beat</sub> = |260 - 256| = <strong>4 Hz</strong> (or 4 beats per second)."
            },
            {
                id: 5, section: "Multiple Choice", type: "mcq",
                question: "The speed of sound depends primarily on the properties of the medium it travels through. In which of the following media does sound generally travel the fastest?",
                options: ["Vacuum", "Air (Gas)", "Water (Liquid)", "Steel (Solid)"],
                correct: 3,
                explanation: "Sound travels fastest in <strong>solids (like steel)</strong> because the molecules are densely packed and strongly bonded, allowing the mechanical disturbance to transfer very quickly. Sound cannot travel in a vacuum at all."
            },

            // --- TRUE / FALSE ---
            {
                id: 6, section: "True / False", type: "tf",
                question: "The speed of sound in air increases as the temperature of the air increases.",
                correct: true,
                explanation: "True. Higher temperature means the air molecules have greater kinetic energy and move faster, allowing them to transmit the sound wave's compressions and rarefactions more quickly. (Approx. <span class='eq'>v &asymp; 331 + 0.6T</span> m/s)."
            },
            {
                id: 7, section: "True / False", type: "tf",
                question: "The pitch of a musical sound is determined primarily by the amplitude of the sound wave.",
                correct: false,
                explanation: "False. The pitch of a sound is determined directly by its <strong>frequency</strong> (higher frequency = higher pitch). Amplitude determines the <strong>loudness</strong> or intensity of the sound, not its pitch."
            },
            {
                id: 8, section: "True / False", type: "tf",
                question: "If the distance from a point source of sound is doubled, the intensity of the sound is halved.",
                correct: false,
                explanation: "False. Sound intensity follows an <i>Inverse Square Law</i> (<span class='eq'>I &prop; 1/r<sup>2</sup></span>). If the distance (<span class='math-symbol'>r</span>) is doubled, the intensity drops by a factor of 2<sup>2</sup>, meaning it becomes <strong>one-quarter (1/4)</strong> of its original value."
            },
            {
                id: 9, section: "True / False", type: "tf",
                question: "A pipe that is open at both ends will form standing waves with displacement antinodes at both ends.",
                correct: true,
                explanation: "True. At the open ends of a pipe, air molecules are free to move maximally, creating displacement <strong>antinodes</strong> (which correspond to pressure nodes)."
            },
            {
                id: 10, section: "True / False", type: "tf",
                question: "Human hearing typically responds to frequencies in the range of 20 Hz to 20,000 Hz.",
                correct: true,
                explanation: "True. This is the universally accepted standard range for normal human hearing. Frequencies below 20 Hz are infrasound, and above 20,000 Hz are ultrasound."
            },

            // --- FILL IN THE BLANKS ---
            {
                id: 11, section: "Fill in the Blanks", type: "fib",
                question: "Sound waves with frequencies strictly higher than 20,000 Hz are scientifically termed ______.",
                correct: "Ultrasound",
                explanation: "Ultrasound refers to sound waves with frequencies above the upper limit of human hearing. They are widely used in medical imaging and industrial non-destructive testing."
            },
            {
                id: 12, section: "Fill in the Blanks", type: "fib",
                question: "The logarithmic unit specifically designed to measure the relative intensity level (loudness) of a sound is the ______.",
                correct: "Decibel",
                explanation: "Because the human ear responds to sound intensity logarithmically rather than linearly, the Decibel (dB) scale provides a much more manageable way to express loudness."
            },
            {
                id: 13, section: "Fill in the Blanks", type: "fib",
                question: "______ occurs when an external driving frequency exactly matches the natural frequency of a system, resulting in dramatically large amplitude oscillations.",
                correct: "Resonance",
                explanation: "Resonance is a critical phenomenon in acoustics. It is how musical instruments amplify sound; the body of a guitar resonates with the frequency of its plucked strings."
            },
            {
                id: 14, section: "Fill in the Blanks", type: "fib",
                question: "In a sound wave traveling through air, the regions where molecules are pushed tightly together are called compressions, while the spread-out regions are called ______.",
                correct: "Rarefactions",
                explanation: "A longitudinal sound wave is a continuous sequence of high-pressure zones (compressions) and low-pressure zones (rarefactions) moving through the medium."
            },
            {
                id: 15, section: "Fill in the Blanks", type: "fib",
                question: "The physical property of a sound wave that corresponds to our subjective perception of 'pitch' is its ______.",
                correct: "Frequency",
                explanation: "The human brain interprets the physical frequency (oscillations per second) of a sound wave as its pitch. High frequency sounds 'shrill', while low frequency sounds 'deep'."
            },

            // --- MATCHING ---
            {
                id: 16, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>I = P / (4&pi;r<sup>2</sup>)</span>",
                correct: "A",
                explanation: "This is the Inverse Square Law. It calculates the intensity (I) of a spherical sound wave spreading uniformly in all directions from a point source."
            },
            {
                id: 17, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>f' = f [ (v &plusmn; v<sub>o</sub>) / (v &#8723; v<sub>s</sub>) ]</span>",
                correct: "D",
                explanation: "This is the general, combined formula for the Doppler Effect, accounting for the velocities of both the observer (<span class='eq'>v<sub>o</sub></span>) and the source (<span class='eq'>v<sub>s</sub></span>)."
            },
            {
                id: 18, section: "Matching", type: "match",
                question: "Constant: <span class='eq'>I<sub>0</sub> = 1.0 &times; 10<sup>-12</sup> W/m<sup>2</sup></span>",
                correct: "C",
                explanation: "This represents the standard Threshold of Hearing, which is the quietest sound intensity that an average human ear can detect at a frequency of 1000 Hz."
            },
            {
                id: 19, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>f<sub>beat</sub> = | f<sub>1</sub> - f<sub>2</sub> |</span>",
                correct: "B",
                explanation: "This equation is used to calculate the beat frequency when two sound waves of slightly different frequencies interfere with each other."
            },
            {
                id: 20, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>v = &lambda; f</span>",
                correct: "E",
                explanation: "This is the fundamental wave equation that directly relates the speed of the wave (<span class='math-symbol'>v</span>) to its wavelength (<span class='math-symbol'>&lambda;</span>) and frequency (<span class='math-symbol'>f</span>)."
            }
        ];

        // Shared resources
        const wordBank = ["Rarefactions", "Ultrasound", "Decibel", "Resonance", "Frequency"];
        const matchOptions = [
            { letter: "A", text: "Equation for the intensity of a spherical wave (Inverse Square Law)." },
            { letter: "B", text: "Equation for calculating the beat frequency of interfering waves." },
            { letter: "C", text: "The standard threshold of human hearing (Reference Intensity)." },
            { letter: "D", text: "The general formula for the Doppler effect." },
            { letter: "E", text: "The fundamental wave equation relating speed, wavelength, and frequency." }
        ];

        let score = 0;
        let answeredQuestions = 0;

        // Render Quiz
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const sections = ["Multiple Choice", "True / False", "Fill in the Blanks", "Matching"];

            sections.forEach(sectionTitle => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = "mb-16";
                
                const sectionHeader = document.createElement('h2');
                sectionHeader.className = "text-2xl md:text-3xl font-black text-cyan-900 border-b-4 border-cyan-200 pb-3 mb-8 flex items-center gap-3";
                
                // Add icon based on section
                let iconSvg = '';
                if(sectionTitle === "Multiple Choice") iconSvg = '<svg class="w-8 h-8 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                else if(sectionTitle === "True / False") iconSvg = '<svg class="w-8 h-8 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>';
                else if(sectionTitle === "Fill in the Blanks") iconSvg = '<svg class="w-8 h-8 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>';
                else iconSvg = '<svg class="w-8 h-8 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>';

                sectionHeader.innerHTML = `${iconSvg} ${sectionTitle}`;
                sectionDiv.appendChild(sectionHeader);

                if (sectionTitle === "Fill in the Blanks") {
                    const wbDiv = document.createElement('div');
                    wbDiv.className = "bg-white p-6 rounded-2xl mb-8 shadow-sm border border-cyan-100";
                    wbDiv.innerHTML = `<h3 class="font-bold text-cyan-700 mb-3 text-sm uppercase tracking-widest">Word Bank Collection</h3>
                                       <div class="flex flex-wrap gap-3">${wordBank.sort().map(w => `<span class="bg-cyan-50 border border-cyan-200 px-4 py-2 rounded-lg text-cyan-900 font-bold shadow-sm">${w}</span>`).join('')}</div>`;
                    sectionDiv.appendChild(wbDiv);
                } else if (sectionTitle === "Matching") {
                    const matchTable = document.createElement('div');
                    matchTable.className = "bg-white p-6 rounded-2xl mb-8 shadow-sm border border-cyan-100";
                    matchTable.innerHTML = `<h3 class="font-bold text-cyan-700 mb-4 text-sm uppercase tracking-widest">List B (Definitions & Equations)</h3>
                                            <ul class="space-y-3">
                                                ${matchOptions.map(opt => `<li class="flex gap-4 p-4 bg-slate-50 rounded-xl border border-slate-200"><strong class="text-cyan-700 font-black text-lg bg-cyan-100 w-8 h-8 flex items-center justify-center rounded-lg shrink-0 shadow-sm">${opt.letter}</strong> <span class="text-slate-700 font-medium">${opt.text}</span></li>`).join('')}
                                            </ul>`;
                    sectionDiv.appendChild(matchTable);
                }

                const sectionQuestions = quizData.filter(q => q.section === sectionTitle);
                
                sectionQuestions.forEach((q, index) => {
                    const qCard = document.createElement('div');
                    qCard.className = "bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-cyan-100 mb-6 transition-all relative overflow-hidden group hover:border-cyan-400 hover:shadow-lg";
                    qCard.id = `q-card-${q.id}`;

                    let interactionHTML = '';

                    if (q.type === 'mcq') {
                        interactionHTML = `<div class="mt-6 grid gap-3">
                            ${q.options.map((opt, i) => `
                                <button onclick="checkAnswer(${q.id}, ${i})" id="btn-${q.id}-${i}" 
                                class="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-cyan-400 hover:bg-cyan-50 transition-all font-medium text-slate-700 text-lg flex items-start gap-4">
                                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-100 text-slate-500 font-bold text-sm shrink-0 mt-0.5">${String.fromCharCode(65 + i)}</span> 
                                    <span class="leading-relaxed">${opt}</span>
                                </button>
                            `).join('')}
                        </div>`;
                    } else if (q.type === 'tf') {
                        interactionHTML = `<div class="mt-6 flex gap-4">
                            <button onclick="checkAnswer(${q.id}, true)" id="btn-${q.id}-true" class="flex-1 p-5 rounded-2xl border-2 border-slate-100 hover:border-cyan-400 hover:bg-cyan-50 transition-all font-black text-xl text-slate-700 shadow-sm">True</button>
                            <button onclick="checkAnswer(${q.id}, false)" id="btn-${q.id}-false" class="flex-1 p-5 rounded-2xl border-2 border-slate-100 hover:border-cyan-400 hover:bg-cyan-50 transition-all font-black text-xl text-slate-700 shadow-sm">False</button>
                        </div>`;
                    } else if (q.type === 'fib') {
                        interactionHTML = `<div class="mt-6">
                            <select onchange="checkAnswer(${q.id}, this.value)" id="select-${q.id}" class="w-full md:w-2/3 p-4 rounded-xl border-2 border-slate-200 bg-slate-50 focus:outline-none focus:border-cyan-500 focus:ring-4 focus:ring-cyan-500/20 text-lg font-bold text-slate-700 cursor-pointer shadow-sm transition-all">
                                <option value="" disabled selected>--- Select the correct missing word ---</option>
                                ${wordBank.sort().map(w => `<option value="${w}">${w}</option>`).join('')}
                            </select>
                        </div>`;
                    } else if (q.type === 'match') {
                        interactionHTML = `<div class="mt-6 flex flex-col sm:flex-row sm:items-center gap-4 bg-slate-50 p-5 rounded-xl border border-slate-200">
                            <span class="font-bold text-slate-500 text-sm uppercase tracking-wider whitespace-nowrap">Matches with list B:</span>
                            <select onchange="checkAnswer(${q.id}, this.value)" id="select-${q.id}" class="w-full p-4 rounded-xl border-2 border-slate-200 bg-white focus:outline-none focus:border-cyan-500 focus:ring-4 focus:ring-cyan-500/20 font-black text-slate-700 cursor-pointer shadow-sm transition-all text-center">
                                <option value="" disabled selected>--- Select Correct Option ---</option>
                                ${matchOptions.map(o => `<option value="${o.letter}">Option ${o.letter}</option>`).join('')}
                            </select>
                        </div>`;
                    }

                    qCard.innerHTML = `
                        <div class="flex gap-5">
                            <div class="bg-cyan-100 text-cyan-800 w-12 h-12 rounded-xl flex items-center justify-center font-black text-xl flex-shrink-0 shadow-sm border border-cyan-200">${index + 1}</div>
                            <div class="flex-1 text-xl font-semibold text-slate-800 leading-relaxed pt-1">${q.question}</div>
                        </div>
                        ${interactionHTML}
                        <div id="feedback-${q.id}" class="mt-6 hidden rounded-2xl p-6 text-base animate-fadeIn border-l-4 shadow-sm"></div>
                    `;
                    sectionDiv.appendChild(qCard);
                });

                container.appendChild(sectionDiv);
            });
        }

        // Handle Evaluation
        function checkAnswer(questionId, userAnswer) {
            const questionData = quizData.find(q => q.id === questionId);
            const isCorrect = userAnswer === questionData.correct;
            const card = document.getElementById(`q-card-${questionId}`);
            const feedbackBox = document.getElementById(`feedback-${questionId}`);

            // Lock interaction
            card.classList.add('disabled-card');
            card.classList.remove('hover:border-cyan-400', 'hover:shadow-lg');
            
            let correctIndicator = '';
            let explanationText = `<div class="mt-4 text-slate-800 font-medium leading-relaxed bg-white/70 p-5 rounded-xl border border-white/50 text-[1.05rem] shadow-sm"><span class="block font-bold mb-2 text-sm uppercase tracking-widest text-slate-400">Scientific Explanation</span>${questionData.explanation}</div>`;
            let bestAnswerNotice = '';

            if (isCorrect) {
                score++;
                card.classList.add('border-emerald-300', 'bg-emerald-50/40');
                correctIndicator = `<div class="flex items-center gap-2 font-black text-emerald-700 text-2xl mb-2">
                                        <svg class="w-8 h-8 bg-emerald-100 rounded-full p-1 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                        Correct!
                                    </div>`;
                feedbackBox.className = "mt-6 rounded-2xl p-6 bg-emerald-100 border-l-8 border-emerald-500 block fade-in";
                
                if(questionData.type === 'mcq' || questionData.type === 'tf') {
                    const btn = document.getElementById(`btn-${questionId}-${userAnswer}`);
                    btn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 font-bold text-emerald-900 text-lg flex items-start gap-4 shadow-md";
                }
            } else {
                card.classList.add('border-rose-300', 'bg-rose-50/40');
                correctIndicator = `<div class="flex items-center gap-2 font-black text-rose-700 text-2xl mb-1">
                                        <svg class="w-8 h-8 bg-rose-100 rounded-full p-1 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        Incorrect
                                    </div>`;
                
                let correctAnswerLabel = questionData.correct;
                if (questionData.type === 'mcq') {
                    correctAnswerLabel = `${String.fromCharCode(65 + questionData.correct)}. ${questionData.options[questionData.correct]}`;
                } else if (questionData.type === 'tf') {
                    correctAnswerLabel = questionData.correct ? "True" : "False";
                } else if (questionData.type === 'match') {
                    correctAnswerLabel = `Option ${questionData.correct}`;
                }

                bestAnswerNotice = `<div class="text-rose-900 font-semibold mt-3 text-lg bg-rose-200/50 p-3 rounded-lg border border-rose-300">
                    The correct answer is: <span class="bg-white px-3 py-1.5 rounded-md border border-rose-300 shadow-sm inline-block ml-1 font-black">${correctAnswerLabel}</span>
                </div>`;
                
                feedbackBox.className = "mt-6 rounded-2xl p-6 bg-rose-100 border-l-8 border-rose-500 block fade-in";

                if(questionData.type === 'mcq' || questionData.type === 'tf') {
                    const wrongBtn = document.getElementById(`btn-${questionId}-${userAnswer}`);
                    if(wrongBtn) wrongBtn.className = "w-full text-left p-4 rounded-xl border-2 border-rose-300 bg-rose-50 font-medium text-rose-900 text-lg flex items-start gap-4 opacity-60 line-through";
                    
                    const rightBtn = document.getElementById(`btn-${questionId}-${questionData.correct}`);
                    if(rightBtn) rightBtn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 font-bold text-emerald-900 text-lg flex items-start gap-4 shadow-md mt-2";
                }
            }

            if(questionData.type === 'fib' || questionData.type === 'match') {
                const sel = document.getElementById(`select-${questionId}`);
                sel.disabled = true;
                if(isCorrect) {
                    sel.className = "w-full md:w-2/3 p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-800 font-black text-center appearance-none shadow-md";
                } else {
                    sel.className = "w-full md:w-2/3 p-4 rounded-xl border-2 border-rose-400 bg-rose-50 text-rose-800 font-bold text-center appearance-none line-through opacity-70";
                }
            }

            feedbackBox.innerHTML = correctIndicator + bestAnswerNotice + explanationText;

            answeredQuestions++;
            if(answeredQuestions === quizData.length) {
                document.getElementById('completion-message').classList.remove('hidden');
                
                const finalScoreElem = document.getElementById('final-score');
                finalScoreElem.innerText = `${score} / ${quizData.length}`;
                if (score === 20) finalScoreElem.className = "mt-6 text-6xl font-black text-emerald-500 drop-shadow-md mb-2";
                else if (score >= 15) finalScoreElem.className = "mt-6 text-6xl font-black text-cyan-600 drop-shadow-md mb-2";
                else if (score >= 10) finalScoreElem.className = "mt-6 text-6xl font-black text-amber-500 drop-shadow-md mb-2";
                else finalScoreElem.className = "mt-6 text-6xl font-black text-rose-500 drop-shadow-md mb-2";
            }
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
