<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Quiz: Chapter Problems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f1f5f9; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .disabled-card { pointer-events: none; opacity: 0.9; }
        
        /* Custom styling for physics equations and math */
        .eq { font-family: 'Times New Roman', serif; font-style: italic; font-size: 1.15em; font-weight: 600; color: #312e81; letter-spacing: 0.02em; }
        .math-symbol { font-family: 'Times New Roman', serif; font-style: italic; font-weight: bold; }
        .physics-block { background-color: #e0e7ff; padding: 2px 6px; border-radius: 4px; border: 1px solid #c7d2fe; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="bg-gradient-to-br from-indigo-800 to-slate-800 text-white rounded-3xl p-8 mb-10 shadow-2xl text-center fade-in border-b-8 border-indigo-500">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight drop-shadow-md">Chapter Problems</h1>
            <p class="text-indigo-200 text-lg md:text-xl font-medium">General Physics (1) - Comprehensive Assessment</p>
            <div class="mt-6 flex flex-wrap justify-center gap-3 text-sm font-semibold">
                <span class="bg-white/10 px-4 py-1.5 rounded-full border border-white/20 backdrop-blur-md">20 Questions</span>
                <span class="bg-white/10 px-4 py-1.5 rounded-full border border-white/20 backdrop-blur-md">Calculations & Concepts</span>
                <span class="bg-white/10 px-4 py-1.5 rounded-full border border-white/20 backdrop-blur-md">Detailed Explanations</span>
            </div>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-container" class="space-y-12"></div>
        
        <!-- Completion Section -->
        <div id="completion-message" class="hidden text-center mt-12 mb-12 fade-in">
            <div class="bg-white p-10 rounded-3xl shadow-xl border-2 border-indigo-100">
                <h2 class="text-3xl font-black text-slate-800 mb-3">Assessment Completed! 🎓</h2>
                <p class="text-lg text-slate-600">You have solved all the chapter problems. Review your detailed solutions below.</p>
                <div class="mt-6 text-6xl font-black text-indigo-600 drop-shadow-sm mb-2" id="final-score"></div>
                <button onclick="location.reload()" class="mt-8 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-indigo-700 hover:shadow-lg transition-all transform hover:-translate-y-1">Retake Assessment</button>
            </div>
        </div>
    </div>

    <script>
        // Quiz Data Model based on General Physics (1) - End of Chapter Problems (Pages 113-117 context)
        const quizData = [
            // --- MULTIPLE CHOICE ---
            {
                id: 1, section: "Multiple Choice", type: "mcq",
                question: "<strong>Problem:</strong> A gas absorbs <span class='physics-block'>400 J</span> of heat from its surroundings and simultaneously does <span class='physics-block'>120 J</span> of work on a piston. What is the change in the internal energy of the gas?",
                options: ["520 J", "280 J", "-280 J", "120 J"],
                correct: 1,
                explanation: "According to the First Law of Thermodynamics, <span class='eq'>&Delta;E<sub>int</sub> = Q - W</span>. The heat added is positive (Q = 400 J) and the work done BY the gas is positive (W = 120 J). <br>Therefore, &Delta;E<sub>int</sub> = 400 J - 120 J = <strong>280 J</strong>."
            },
            {
                id: 2, section: "Multiple Choice", type: "mcq",
                question: "<strong>Problem:</strong> A steel bridge is <span class='physics-block'>1000 m</span> long at a temperature of <span class='physics-block'>-5&deg;C</span>. If the temperature rises to <span class='physics-block'>35&deg;C</span> in the summer, how much does its length expand? <br><span class='text-sm text-slate-500'>(Given: &alpha;<sub>steel</sub> = 11 &times; 10<sup>-6</sup> &deg;C<sup>-1</sup>)</span>",
                options: ["0.44 m", "0.22 m", "4.4 m", "0.044 m"],
                correct: 0,
                explanation: "Using the linear expansion formula <span class='eq'>&Delta;L = &alpha; L<sub>0</sub> &Delta;T</span>: <br>&Delta;T = 35 - (-5) = 40&deg;C. <br>&Delta;L = (11 &times; 10<sup>-6</sup>) &times; (1000 m) &times; (40&deg;C) = 44000 &times; 10<sup>-6</sup> m = <strong>0.44 m</strong>."
            },
            {
                id: 3, section: "Multiple Choice", type: "mcq",
                question: "In a <strong>P-V (Pressure-Volume) diagram</strong>, what does the geometrical area exactly under the curve of a thermodynamic process represent?",
                options: [
                    "The net heat added to the gas.",
                    "The change in internal energy of the gas.",
                    "The thermodynamic work done by or on the gas.",
                    "The temperature variation during the process."
                ],
                correct: 2,
                explanation: "Work is defined as <span class='eq'>W = &int; P dV</span>. On a graph where Pressure is the y-axis and Volume is the x-axis, the integral (area under the curve) mathematically represents the Work done."
            },
            {
                id: 4, section: "Multiple Choice", type: "mcq",
                question: "<strong>Problem:</strong> What is the rate of heat conduction through a <span class='physics-block'>0.10 m</span> thick brick wall (<span class='eq'>k = 0.6 W/m&middot;K</span>) with an area of <span class='physics-block'>10 m<sup>2</sup></span>, if the inner temperature is <span class='physics-block'>20&deg;C</span> and the outer is <span class='physics-block'>0&deg;C</span>?",
                options: ["1200 W", "600 W", "120 W", "2400 W"],
                correct: 0,
                explanation: "Using Fourier's Law of Conduction <span class='eq'>P = kA&Delta;T / L</span>: <br>P = (0.6) &times; (10) &times; (20) / 0.10 = 120 / 0.10 = <strong>1200 W</strong>."
            },
            {
                id: 5, section: "Multiple Choice", type: "mcq",
                question: "<strong>Problem:</strong> If a <span class='physics-block'>0.5 kg</span> block of aluminum (<span class='eq'>c = 900 J/kg&middot;&deg;C</span>) at <span class='physics-block'>100&deg;C</span> is dropped into <span class='physics-block'>1.0 kg</span> of water (<span class='eq'>c = 4186 J/kg&middot;&deg;C</span>) at <span class='physics-block'>20&deg;C</span> in an isolated container. What is the approximate final equilibrium temperature?",
                options: ["27.7&deg;C", "40.0&deg;C", "60.0&deg;C", "80.0&deg;C"],
                correct: 0,
                explanation: "Applying Conservation of Energy (&Sigma;Q = 0): Heat lost by Al = Heat gained by Water.<br> <span class='eq'>m<sub>al</sub>c<sub>al</sub>(100 - T<sub>f</sub>) = m<sub>w</sub>c<sub>w</sub>(T<sub>f</sub> - 20)</span><br> (0.5)(900)(100 - T<sub>f</sub>) = (1.0)(4186)(T<sub>f</sub> - 20)<br> 45000 - 450T<sub>f</sub> = 4186T<sub>f</sub> - 83720<br> 128720 = 4636T<sub>f</sub> &rarr; T<sub>f</sub> &asymp; <strong>27.7&deg;C</strong>."
            },

            // --- TRUE / FALSE ---
            {
                id: 6, section: "True / False", type: "tf",
                question: "If a thermodynamic system undergoes a <i>cyclic process</i> (returns exactly to its initial state), the net change in its internal energy over one complete cycle is always exactly zero.",
                correct: true,
                explanation: "Because internal energy (<span class='eq'>E<sub>int</sub></span>) is a <i>state function</i>, it depends only on the current state. If the initial and final states are identical (a full cycle), the change <span class='eq'>&Delta;E<sub>int</sub></span> is zero."
            },
            {
                id: 7, section: "True / False", type: "tf",
                question: "When an ideal gas expands isothermally (at a constant temperature), the heat (<span class='eq'>Q</span>) added to the gas is entirely converted into work (<span class='eq'>W</span>).",
                correct: true,
                explanation: "For an ideal gas, internal energy depends only on temperature. In an isothermal process, &Delta;T = 0, so &Delta;E<sub>int</sub> = 0. According to the First Law (<span class='eq'>0 = Q - W</span>), therefore <span class='eq'>Q = W</span>."
            },
            {
                id: 8, section: "True / False", type: "tf",
                question: "According to the laws of thermodynamics, heat can spontaneously flow from a colder body to a hotter body without any external work being done on the system.",
                correct: false,
                explanation: "This violates the Second Law of Thermodynamics (Clausius statement). Heat naturally flows from hot to cold. To move heat from cold to hot (like in a refrigerator), external work <i>must</i> be applied."
            },
            {
                id: 9, section: "True / False", type: "tf",
                question: "The latent heat of vaporization for a substance is typically much smaller than its latent heat of fusion.",
                correct: false,
                explanation: "The latent heat of vaporization is almost always <strong>much larger</strong>. Fusion only requires weakening the bonds of a solid to form a liquid, whereas vaporization requires completely breaking all intermolecular bonds to separate molecules into a gas."
            },
            {
                id: 10, section: "True / False", type: "tf",
                question: "In an isochoric (constant volume) process, the thermodynamic work done by the gas is always zero.",
                correct: true,
                explanation: "Work is calculated as <span class='eq'>W = P&Delta;V</span>. If the volume is constant, the change in volume (<span class='eq'>&Delta;V</span>) is exactly zero, making the work done zero regardless of pressure changes."
            },

            // --- FILL IN THE BLANKS ---
            {
                id: 11, section: "Fill in the Blanks", type: "fib",
                question: "The amount of heat required to change the phase of 1 kg of a substance without changing its temperature at all is called ______.",
                correct: "Latent Heat",
                explanation: "During a phase change, the energy added (Latent Heat) goes entirely into breaking or forming intermolecular bonds, not into changing the kinetic energy (temperature) of the molecules."
            },
            {
                id: 12, section: "Fill in the Blanks", type: "fib",
                question: "A process in which the volume of the system remains rigidly constant, meaning no mechanical work is done, is called an ______ process.",
                correct: "Isochoric",
                explanation: "The prefix 'iso-' means constant, and 'choric' relates to volume. In an isochoric process, all added heat goes directly into increasing internal energy (<span class='eq'>&Delta;E<sub>int</sub> = Q</span>)."
            },
            {
                id: 13, section: "Fill in the Blanks", type: "fib",
                question: "The \"mechanical equivalent of heat\" establishes the direct numerical relationship between calories and the standard SI unit of energy, the ______.",
                correct: "Joule",
                explanation: "James Prescott Joule proved that heat and mechanical work are interchangeable forms of energy, establishing that 1 calorie exactly equals 4.186 Joules."
            },
            {
                id: 14, section: "Fill in the Blanks", type: "fib",
                question: "A generic device calibrated to accurately measure the temperature of a system by reaching thermal equilibrium with it is called a ______.",
                correct: "Thermometer",
                explanation: "A thermometer utilizes a measurable physical property that changes with temperature (like the volume of a liquid) and relies on the Zeroth Law of Thermodynamics to gauge temperature."
            },
            {
                id: 15, section: "Fill in the Blanks", type: "fib",
                question: "The specific property of a material's surface that defines how efficiently it radiates energy compared to a perfect blackbody is called ______.",
                correct: "Emissivity",
                explanation: "Emissivity (<span class='math-symbol'>&epsilon;</span>) is a value from 0 to 1. A perfectly emitting and absorbing surface (blackbody) has an emissivity of 1."
            },

            // --- MATCHING ---
            {
                id: 16, section: "Matching", type: "match",
                question: "Condition: <span class='eq'>&Delta;E<sub>int</sub> = 0</span>",
                correct: "C",
                explanation: "Because the internal energy of an ideal gas depends only on temperature, if the temperature doesn't change (Isothermal), the internal energy doesn't change."
            },
            {
                id: 17, section: "Matching", type: "match",
                question: "Condition: <span class='eq'>Q = 0</span>",
                correct: "D",
                explanation: "An adiabatic process is strictly defined as one where the system is perfectly insulated, meaning no heat (Q) is exchanged with the environment."
            },
            {
                id: 18, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>&Sigma;Q<sub>gained</sub> + &Sigma;Q<sub>lost</sub> = 0</span>",
                correct: "B",
                explanation: "This equation represents the conservation of energy in calorimetry. In an isolated container, the total heat transfer sums to exactly zero."
            },
            {
                id: 19, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>W = &int; P dV</span>",
                correct: "A",
                explanation: "This is the universal calculus-based formula for determining the work done during any thermodynamic process by evaluating the area under the P-V curve."
            },
            {
                id: 20, section: "Matching", type: "match",
                question: "Equation: <span class='eq'>P<sub>rad</sub> = &sigma;&epsilon;AT<sup>4</sup></span>",
                correct: "E",
                explanation: "This is the Stefan-Boltzmann law, which calculates the exact thermal power (Watts) radiated by an object based on its temperature and surface area."
            }
        ];

        // Shared resources for specific sections
        const wordBank = ["Isochoric", "Latent Heat", "Emissivity", "Joule", "Thermometer"];
        const matchOptions = [
            { letter: "A", text: "General equation for calculating thermodynamic work from a P-V graph." },
            { letter: "B", text: "Calorimetry principle for an isolated system." },
            { letter: "C", text: "Mathematical condition for an Isothermal process of an ideal gas." },
            { letter: "D", text: "Mathematical condition for an Adiabatic process." },
            { letter: "E", text: "Equation to calculate thermal power radiated by an object." }
        ];

        let score = 0;
        let answeredQuestions = 0;

        // Render the Quiz
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const sections = ["Multiple Choice", "True / False", "Fill in the Blanks", "Matching"];

            sections.forEach(sectionTitle => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = "mb-16";
                
                const sectionHeader = document.createElement('h2');
                sectionHeader.className = "text-2xl md:text-3xl font-black text-indigo-900 border-b-4 border-indigo-200 pb-3 mb-8 flex items-center gap-3";
                sectionHeader.innerHTML = `<svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> ${sectionTitle}`;
                sectionDiv.appendChild(sectionHeader);

                if (sectionTitle === "Fill in the Blanks") {
                    const wbDiv = document.createElement('div');
                    wbDiv.className = "bg-white p-6 rounded-2xl mb-8 shadow-sm border border-slate-200";
                    wbDiv.innerHTML = `<h3 class="font-bold text-slate-500 mb-3 text-sm uppercase tracking-widest">Word Bank Collection</h3>
                                       <div class="flex flex-wrap gap-3">${wordBank.sort().map(w => `<span class="bg-indigo-50 border border-indigo-200 px-4 py-2 rounded-lg text-indigo-900 font-bold shadow-sm">${w}</span>`).join('')}</div>`;
                    sectionDiv.appendChild(wbDiv);
                } else if (sectionTitle === "Matching") {
                    const matchTable = document.createElement('div');
                    matchTable.className = "bg-white p-6 rounded-2xl mb-8 shadow-sm border border-slate-200";
                    matchTable.innerHTML = `<h3 class="font-bold text-slate-500 mb-4 text-sm uppercase tracking-widest">List B (Definitions & Rules)</h3>
                                            <ul class="space-y-3">
                                                ${matchOptions.map(opt => `<li class="flex gap-4 p-4 bg-slate-50 rounded-xl border border-slate-200"><strong class="text-indigo-600 font-black text-lg bg-indigo-100 w-8 h-8 flex items-center justify-center rounded-lg shrink-0">${opt.letter}</strong> <span class="text-slate-700 font-medium">${opt.text}</span></li>`).join('')}
                                            </ul>`;
                    sectionDiv.appendChild(matchTable);
                }

                const sectionQuestions = quizData.filter(q => q.section === sectionTitle);
                
                sectionQuestions.forEach((q, index) => {
                    const qCard = document.createElement('div');
                    qCard.className = "bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 mb-6 transition-all relative overflow-hidden group hover:border-indigo-300 hover:shadow-lg";
                    qCard.id = `q-card-${q.id}`;

                    let interactionHTML = '';

                    if (q.type === 'mcq') {
                        interactionHTML = `<div class="mt-6 grid gap-3">
                            ${q.options.map((opt, i) => `
                                <button onclick="checkAnswer(${q.id}, ${i})" id="btn-${q.id}-${i}" 
                                class="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-medium text-slate-700 text-lg flex items-start gap-4">
                                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-100 text-slate-500 font-bold text-sm shrink-0 mt-0.5">${String.fromCharCode(65 + i)}</span> 
                                    <span class="leading-relaxed">${opt}</span>
                                </button>
                            `).join('')}
                        </div>`;
                    } else if (q.type === 'tf') {
                        interactionHTML = `<div class="mt-6 flex gap-4">
                            <button onclick="checkAnswer(${q.id}, true)" id="btn-${q.id}-true" class="flex-1 p-5 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-black text-xl text-slate-700 shadow-sm">True</button>
                            <button onclick="checkAnswer(${q.id}, false)" id="btn-${q.id}-false" class="flex-1 p-5 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all font-black text-xl text-slate-700 shadow-sm">False</button>
                        </div>`;
                    } else if (q.type === 'fib') {
                        interactionHTML = `<div class="mt-6">
                            <select onchange="checkAnswer(${q.id}, this.value)" id="select-${q.id}" class="w-full md:w-2/3 p-4 rounded-xl border-2 border-slate-200 bg-slate-50 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 text-lg font-bold text-slate-700 cursor-pointer shadow-sm transition-all">
                                <option value="" disabled selected>--- Select the correct missing word ---</option>
                                ${wordBank.sort().map(w => `<option value="${w}">${w}</option>`).join('')}
                            </select>
                        </div>`;
                    } else if (q.type === 'match') {
                        interactionHTML = `<div class="mt-6 flex flex-col sm:flex-row sm:items-center gap-4 bg-slate-50 p-5 rounded-xl border border-slate-200">
                            <span class="font-bold text-slate-500 text-sm uppercase tracking-wider whitespace-nowrap">Matches with list B:</span>
                            <select onchange="checkAnswer(${q.id}, this.value)" id="select-${q.id}" class="w-full p-4 rounded-xl border-2 border-slate-200 bg-white focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 font-black text-slate-700 cursor-pointer shadow-sm transition-all text-center">
                                <option value="" disabled selected>--- Select Correct Option ---</option>
                                ${matchOptions.map(o => `<option value="${o.letter}">Option ${o.letter}</option>`).join('')}
                            </select>
                        </div>`;
                    }

                    qCard.innerHTML = `
                        <div class="flex gap-5">
                            <div class="bg-indigo-100 text-indigo-800 w-12 h-12 rounded-xl flex items-center justify-center font-black text-xl flex-shrink-0 shadow-sm border border-indigo-200">${index + 1}</div>
                            <div class="flex-1 text-xl font-semibold text-slate-800 leading-relaxed pt-1">${q.question}</div>
                        </div>
                        ${interactionHTML}
                        <div id="feedback-${q.id}" class="mt-6 hidden rounded-2xl p-6 text-base animate-fadeIn border-l-4 shadow-sm"></div>
                    `;
                    sectionDiv.appendChild(qCard);
                });

                container.appendChild(sectionDiv);
            });
        }

        // Handle Evaluation
        function checkAnswer(questionId, userAnswer) {
            const questionData = quizData.find(q => q.id === questionId);
            const isCorrect = userAnswer === questionData.correct;
            const card = document.getElementById(`q-card-${questionId}`);
            const feedbackBox = document.getElementById(`feedback-${questionId}`);

            // Lock interaction completely
            card.classList.add('disabled-card');
            card.classList.remove('hover:border-indigo-300', 'hover:shadow-lg');
            
            let correctIndicator = '';
            // The explanation is injected directly into the HTML
            let explanationText = `<div class="mt-4 text-slate-800 font-medium leading-relaxed bg-white/70 p-5 rounded-xl border border-white/50 text-[1.05rem] shadow-sm"><span class="block font-bold mb-2 text-sm uppercase tracking-widest text-slate-400">Detailed Explanation</span>${questionData.explanation}</div>`;
            let bestAnswerNotice = '';

            if (isCorrect) {
                score++;
                card.classList.add('border-emerald-300', 'bg-emerald-50/50');
                correctIndicator = `<div class="flex items-center gap-2 font-black text-emerald-700 text-2xl mb-2">
                                        <svg class="w-8 h-8 bg-emerald-100 rounded-full p-1 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                        Excellent! That is Correct.
                                    </div>`;
                feedbackBox.className = "mt-6 rounded-2xl p-6 bg-emerald-100 border-l-8 border-emerald-500 block fade-in";
                
                if(questionData.type === 'mcq' || questionData.type === 'tf') {
                    const btn = document.getElementById(`btn-${questionId}-${userAnswer}`);
                    btn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 font-bold text-emerald-900 text-lg flex items-start gap-4 shadow-md";
                }
            } else {
                card.classList.add('border-rose-300', 'bg-rose-50/50');
                correctIndicator = `<div class="flex items-center gap-2 font-black text-rose-700 text-2xl mb-1">
                                        <svg class="w-8 h-8 bg-rose-100 rounded-full p-1 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        Incorrect
                                    </div>`;
                
                let correctAnswerLabel = questionData.correct;
                if (questionData.type === 'mcq') {
                    correctAnswerLabel = `${String.fromCharCode(65 + questionData.correct)}. ${questionData.options[questionData.correct]}`;
                } else if (questionData.type === 'tf') {
                    correctAnswerLabel = questionData.correct ? "True" : "False";
                } else if (questionData.type === 'match') {
                    correctAnswerLabel = `Option ${questionData.correct}`;
                }

                // Explicitly addressing "why the correct one is best"
                bestAnswerNotice = `<div class="text-rose-900 font-semibold mt-3 text-lg bg-rose-200/50 p-3 rounded-lg border border-rose-300">
                    The correct and best answer is: <span class="bg-white px-3 py-1.5 rounded-md border border-rose-300 shadow-sm inline-block ml-1 font-black">${correctAnswerLabel}</span>
                </div>`;
                
                feedbackBox.className = "mt-6 rounded-2xl p-6 bg-rose-100 border-l-8 border-rose-500 block fade-in";

                if(questionData.type === 'mcq' || questionData.type === 'tf') {
                    const wrongBtn = document.getElementById(`btn-${questionId}-${userAnswer}`);
                    if(wrongBtn) wrongBtn.className = "w-full text-left p-4 rounded-xl border-2 border-rose-300 bg-rose-50 font-medium text-rose-900 text-lg flex items-start gap-4 opacity-60 line-through";
                    
                    const rightBtn = document.getElementById(`btn-${questionId}-${questionData.correct}`);
                    if(rightBtn) rightBtn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 font-bold text-emerald-900 text-lg flex items-start gap-4 shadow-md mt-2";
                }
            }

            if(questionData.type === 'fib' || questionData.type === 'match') {
                const sel = document.getElementById(`select-${questionId}`);
                sel.disabled = true;
                if(isCorrect) {
                    sel.className = "w-full md:w-2/3 p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-800 font-black text-center appearance-none shadow-md";
                } else {
                    sel.className = "w-full md:w-2/3 p-4 rounded-xl border-2 border-rose-400 bg-rose-50 text-rose-800 font-bold text-center appearance-none line-through opacity-70";
                }
            }

            feedbackBox.innerHTML = correctIndicator + bestAnswerNotice + explanationText;

            answeredQuestions++;
            if(answeredQuestions === quizData.length) {
                document.getElementById('completion-message').classList.remove('hidden');
                
                const finalScoreElem = document.getElementById('final-score');
                finalScoreElem.innerText = `${score} / ${quizData.length}`;
                if (score === 20) finalScoreElem.className = "mt-6 text-6xl font-black text-emerald-500 drop-shadow-md mb-2";
                else if (score >= 15) finalScoreElem.className = "mt-6 text-6xl font-black text-indigo-600 drop-shadow-md mb-2";
                else if (score >= 10) finalScoreElem.className = "mt-6 text-6xl font-black text-amber-500 drop-shadow-md mb-2";
                else finalScoreElem.className = "mt-6 text-6xl font-black text-rose-500 drop-shadow-md mb-2";
            }
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
